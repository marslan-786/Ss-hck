<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Backup Gallery</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f5; margin: 0; padding: 20px; }
        .header { background: #2C3E50; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-size: 28px; }
        p { margin: 5px 0 0 0; color: #1ABC9C; font-weight: bold; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 10px; }
        
        .image-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .image-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .image-card img { width: 100%; height: 250px; object-fit: cover; border-bottom: 3px solid #3498DB; }
        .image-info { padding: 15px; text-align: center; }
        .folder-badge { background: #E74C3C; color: white; padding: 3px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 5px; }
        .file-name { font-size: 14px; color: #2C3E50; word-break: break-all; }
        
        .empty-state { text-align: center; color: #7f8c8d; font-size: 18px; margin-top: 50px; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <div class="header">
        <h1>📦 MongoDB Backup Gallery</h1>
        <p id="status">Connecting to Database...</p>
    </div>

    <div class="gallery-grid" id="galleryContainer">
        <div class="empty-state" id="emptyState">No images found in Database.</div>
    </div>

    <script>
        const socket = io();
        const galleryContainer = document.getElementById('galleryContainer');
        const emptyState = document.getElementById('emptyState');
        const statusText = document.getElementById('status');

        function addImageToGallery(data) {
            if (emptyState) emptyState.style.display = 'none';

            const card = document.createElement('div');
            card.className = 'image-card';
            
            const badgeColor = data.folderName.toLowerCase() === 'snapchat' ? '#F1C40F' : '#3498DB';
            const badgeTextColor = data.folderName.toLowerCase() === 'snapchat' ? '#000' : '#fff';

            card.innerHTML = `
                <img src="${data.fileData}" alt="${data.fileName}">
                <div class="image-info">
                    <div class="folder-badge" style="background: ${badgeColor}; color: ${badgeTextColor};">${data.folderName}</div>
                    <div class="file-name">${data.fileName}</div>
                </div>
            `;
            
            galleryContainer.prepend(card);
        }

        // پیج لوڈ ہوتے ہی MongoDB سے تصویریں منگوائیں
        fetch('/api/get-gallery')
            .then(res => res.json())
            .then(images => {
                if (images && images.length > 0) {
                    // ڈیٹا بیس سے لیٹسٹ پہلے آتی ہیں، ہم الٹا کر کے رینڈر کریں گے تاکہ ٹاپ پر لیٹسٹ رہے
                    images.reverse().forEach(img => addImageToGallery(img));
                    statusText.innerText = `Loaded ${images.length} images from Database!`;
                } else {
                    statusText.innerText = "Database is empty. Waiting for uploads...";
                }
            })
            .catch(err => {
                statusText.innerText = "Error loading from Database!";
                statusText.style.color = "#E74C3C";
            });

        // لائیو اپڈیٹ (جب ایپ چل رہی ہو اور نئی تصویر اپلوڈ کرے)
        socket.on('new_backup_image', (data) => {
            statusText.innerText = `Live Upload: ${data.fileName} saved to DB!`;
            addImageToGallery(data);
            
            setTimeout(() => {
                statusText.innerText = "All Synced!";
            }, 3000);
        });

    </script>
</body>
</html>
